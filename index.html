<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Tom West Show</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #111;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container { padding: 2rem; }
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            color: #999;
            margin-bottom: 2rem;
        }
        a {
            color: #fff;
            text-decoration: none;
            border: 1px solid #444;
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            transition: border-color 0.3s;
        }
        a:hover { border-color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Tom West Show</h1>
        <p>Coming soon</p>
        <a href="https://www.youtube.com/@thetomwestshow" target="_blank">YouTube</a>
    </div>
</body>
</html>
